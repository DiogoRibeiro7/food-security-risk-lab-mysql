services:
  mysql:
    image: mysql:8.4
    container_name: food-security-risk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-food_security_risk}
      MYSQL_USER: ${MYSQL_USER:-food_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-food_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/00_init_database.sql:/docker-entrypoint-initdb.d/00_init_database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: food-security-risk-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
